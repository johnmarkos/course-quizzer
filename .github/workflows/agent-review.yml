name: Agent — Reviewer

# Triggers on new or updated PRs, and on milestone/audit issues.
# This agent is READ-ONLY: no contents:write permission, so it physically
# cannot push code changes regardless of what the model attempts.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to audit (must have review label)'
        required: true
        type: number

concurrency:
  group: reviewer-${{ github.event.pull_request.number || github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  # --- Job 1: Review a PR ---
  review:
    # Only review PRs from the repo owner — safety gate
    if: github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest

    permissions:
      contents: read # Can read code, NOT write — hard role boundary
      pull-requests: write # Can post comments on the PR
      issues: write # Can comment on linked issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for meaningful diffs

      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: ci
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Review PR
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_pr_number: ${{ github.event.pull_request.number }}
          prompt: |
            You are the **Reviewer Agent** for the CourseQuizzer project.

            ## Your Role — STRICTLY READ-ONLY

            You review pull requests. You NEVER edit code, create commits, push
            changes, or modify files. Your only output is a PR comment with your
            findings. If you find issues, describe them — the coding agent will
            fix them.

            ## What to Review

            Read AGENTS.md first — it contains all project rules.

            For this PR, review against these checklists:

            ### Architecture Rules
            Check every numbered rule in the "Architecture Rules" section of
            AGENTS.md. Especially:
            - All LLM API calls go through `packages/engine/src/provider/`
            - Prompts live in `packages/engine/src/prompts/`
            - Engine has zero browser API dependencies
            - Engine/UI boundary: events carry all data the UI needs
            - API keys never appear in logs, error messages, exports, or URLs

            ### Code Quality
            - No `any` types (except interfacing with untyped external APIs)
            - Defensive copies of caller-provided data
            - Private fields (`#field`) for engine internals
            - Descriptive variable names, section comments where needed
            - Can a junior engineer read each file and understand it?

            ### Testing
            - New functionality has meaningful tests
            - Tests prove the code works, not just that it runs
            - No wasted tests (testing trivial getters, framework internals)

            ### Security (if applicable)
            - No `eval()` or `new Function()`
            - No `{@html}` without sanitization
            - API keys handled correctly
            - Import/export validation

            ### Prompt Quality (if prompt files changed)
            - Version constant bumped
            - Builder functions (not raw template strings)
            - User-controlled data in user message, not system prompt

            ## Output Format

            Post exactly ONE comment on the PR in this format:

            ```
            ## Review — Reviewer Agent

            **PR:** #<number> — <title>
            **Status:** APPROVED | CHANGES REQUESTED

            ### Blocking Issues
            (Issues that must be fixed before merge. Omit section if none.)

            - **[File:line]** Description of the issue and why it matters.

            ### Non-Blocking Notes
            (Suggestions, style notes, things to consider. Omit section if none.)

            - **[File:line]** Description.

            ### Checklist
            - [x] Architecture rules verified
            - [x] Test coverage adequate
            - [x] Readability acceptable
            - [x] Security checklist (if applicable)
            ```

            If there are no blocking issues, set status to APPROVED.
            If there are blocking issues, set status to CHANGES REQUESTED.

            Be specific — cite file paths and line numbers. Don't be vague.
            Don't suggest "nice to have" refactors — only flag real issues.

            ## Cross-Cutting Issues

            If you find issues that affect files OUTSIDE the scope of this PR
            (e.g., a pattern violation repeated across the codebase), open a
            new GitHub issue for each distinct problem using `gh issue create`.
            Include:
            - Clear title describing the problem
            - Which files are affected
            - What needs to change and why
            - Label: the appropriate package label (`engine`, `app`, etc.)

            This ensures the coding agent automatically picks up the fix.
            Do NOT try to fix cross-cutting issues yourself — you are read-only.

  # --- Job 2: Milestone / codebase audit ---
  audit:
    if: |
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'review' &&
       github.event.issue.user.login == github.repository_owner) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Determine issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get issue details
        id: details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_JSON=$(gh issue view ${{ steps.issue.outputs.number }} --repo ${{ github.repository }} --json title,body,labels)
          echo "title=$(echo "$ISSUE_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"
          # Verify it has the review label
          HAS_REVIEW=$(echo "$ISSUE_JSON" | jq -r '.labels[].name' | grep -c '^review$' || true)
          if [ "$HAS_REVIEW" = "0" ]; then
            echo "::error::Issue #${{ steps.issue.outputs.number }} does not have the 'review' label. Skipping."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run audit
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_issue_number: ${{ steps.issue.outputs.number }}
          prompt: |
            You are the **Reviewer Agent** performing a milestone audit for
            the CourseQuizzer project.

            ## Your Role — STRICTLY READ-ONLY

            You audit the codebase. You NEVER edit code, create commits, or
            push changes. Your outputs are:
            1. A comment on issue #${{ steps.issue.outputs.number }} with your findings
            2. New GitHub issues for any problems found (so the coding agent can fix them)

            ## The Audit Task

            Issue #${{ steps.issue.outputs.number }}: "${{ steps.details.outputs.title }}"

            Read the issue description with `gh issue view ${{ steps.issue.outputs.number }}` for
            the full scope of what to audit.

            ## Process

            1. Read `AGENTS.md` — it contains all rules, checklists, and standards.
            2. Read every source file in `packages/engine/src/` (the main codebase).
            3. Run the checklists specified in the issue (typically: security, readability,
               architecture, content quality).
            4. Check for known issues from prior PR reviews — these were noted during
               individual reviews and should be verified:
               - Getters that leak internal references (defensive copies missing)
               - `network` errors marked non-retryable in ProviderError
               - Dead try/catch blocks
               - Missing validation (e.g., tolerance >= 0)
               - Quality filter gaps (multi-select, two-stage options)
               - Test noise (console output from helpers)
               - Unused test fixtures

            ## Output

            ### Step 1: Post findings on the issue

            Post a comment on issue #${{ steps.issue.outputs.number }} using
            `gh issue comment ${{ steps.issue.outputs.number }}` with this format:

            ```
            ## Milestone Audit — Reviewer Agent

            ### Security
            - Finding or ✓ No issues

            ### Architecture Rules
            - Finding or ✓ All rules followed

            ### Readability
            - Finding or ✓ Acceptable

            ### Content Quality
            - Finding or ✓ Acceptable

            ### Summary
            N issues found. [List of issue numbers created]
            ```

            ### Step 2: Open ONE consolidated fix issue

            Create a single GitHub issue using `gh issue create` that lists ALL
            findings that need code changes. This ensures the coding agent
            addresses everything in one PR.

            Format:
            - Title: "Fix Phase N audit findings"
            - Labels: `engine` (or appropriate package labels)
            - Body:

            ```
            ## Audit Findings from #${{ steps.issue.outputs.number }}

            The following issues were found during the milestone audit.
            Address all of them in a single PR.

            ### Finding 1: <title>
            **Files:** `path/to/file.ts:line`
            **Problem:** Description
            **Fix:** What needs to change

            ### Finding 2: <title>
            ...
            ```

            If no code changes are needed, skip this step.

            ### Step 3: Close the audit issue

            Post a final comment on #${{ steps.issue.outputs.number }} confirming
            the audit is complete, referencing the fix issue number if one was
            created. Then close it: `gh issue close ${{ steps.issue.outputs.number }}`
