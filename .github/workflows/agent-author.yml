name: Agent — Author

# Triggers on:
# 1. New issues — claims and implements unclaimed work
# 2. PR comments with review feedback — addresses reviewer findings
#
# This agent HAS contents:write — it creates branches, edits code, and opens PRs.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  # --- Job 1: Implement a new issue ---
  implement:
    if: |
      github.event_name == 'issues' &&
      github.event.issue.user.login == github.repository_owner &&
      !contains(toJSON(github.event.issue.labels), 'in-progress') &&
      !contains(toJSON(github.event.issue.labels), 'review')
    runs-on: ubuntu-latest

    permissions:
      contents: write # Can create branches and push code
      pull-requests: write # Can open PRs
      issues: write # Can add labels, post comments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Claim issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ github.event.issue.number }} --add-label in-progress

      - name: Implement issue
        uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are the **Coding Agent** for the CourseQuizzer project.

            ## Your Task

            Implement GitHub issue #${{ github.event.issue.number }}.

            Read the issue description carefully. It contains:
            - What to build and why
            - Scope (what's in and out)
            - Which packages are affected
            - Acceptance criteria
            - Dependencies on other issues

            ## Before You Start

            1. Read `AGENTS.md` — it contains all architecture rules, conventions,
               testing philosophy, and prompt engineering standards.
            2. Read `GEMINI.md` for additional context.
            3. Read existing code in the affected package(s) to understand patterns.

            ## Implementation Process

            1. Create a feature branch: `feat/<short-description>`
            2. Implement the feature following all Architecture Rules in AGENTS.md
            3. Write meaningful tests (see Testing Philosophy in AGENTS.md)
            4. Run: `pnpm -r test && pnpm -r build && pnpm format`
            5. Fix any failures before continuing
            6. Update `CHANGELOG.md` with what you built

            ## Self-Review Before Opening PR

            Before opening the PR, review your own changes:
            - Every numbered Architecture Rule followed?
            - No `any` types?
            - No browser APIs in the engine?
            - Defensive copies of caller-provided data?
            - Tests prove the code works?
            - Descriptive names, section comments where needed?

            ## Open the PR

            Open a PR with:
            - Title: concise description of what was built
            - Body: link the issue (`Closes #${{ github.event.issue.number }}`),
              explain the approach, list what was tested
            - Target branch: `main`

            Use `gh pr create` to open the PR.

  # --- Job 2: Address review feedback on an existing PR ---
  address-feedback:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '## Review — Reviewer Agent') &&
      contains(github.event.comment.body, 'CHANGES REQUESTED')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          PR_JSON=$(gh pr view "$PR_NUMBER" --json headRefName,headRepository)
          echo "branch=$(echo "$PR_JSON" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Address review feedback
        uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are the **Coding Agent** for the CourseQuizzer project.

            ## Your Task

            Address the review feedback on PR #${{ steps.pr.outputs.pr_number }}.

            The reviewer posted a comment with blocking issues. Read the review
            comment carefully and fix every blocking issue.

            ## Review Comment

            ${{ github.event.comment.body }}

            ## Process

            1. Read `AGENTS.md` for project rules and conventions.
            2. Read the reviewer's blocking issues above.
            3. For each blocking issue:
               - Read the cited file and line
               - Understand the problem
               - Fix it
            4. Run: `pnpm -r test && pnpm -r build && pnpm format`
            5. Commit and push the fixes to this branch.
            6. Post a PR comment summarizing what was fixed.

            Do NOT address non-blocking notes unless they are trivially easy.
            Focus on the blocking issues only.
