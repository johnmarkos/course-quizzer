name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Test engine
        run: pnpm --filter quizzer-engine test

      - name: Build engine
        run: pnpm --filter quizzer-engine build

      - name: Test app
        run: pnpm --filter coursequizzer test
        continue-on-error: true # No app tests yet — remove once tests exist

      - name: Build app
        run: pnpm --filter coursequizzer build

      - name: Check formatting
        run: pnpm format:check
